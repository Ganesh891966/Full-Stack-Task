<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
margin:0;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
}

header{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
padding:25px;
text-align:center;
border-radius:10px;
margin-top:20px;
}

.main{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-top:25px;
}

@media(max-width:800px){
.main{
grid-template-columns:1fr;
}
}

.box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
color:#2a5298;
border-bottom:2px solid #eee;
padding-bottom:8px;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:12px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.register{
background:#2a5298;
color:white;
}

.clear{
background:#f44336;
color:white;
}

.load{
background:#4CAF50;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#2a5298;
color:white;
}

footer{
text-align:center;
margin-top:30px;
padding:15px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Student Registration System</h1>
<p>HTML5 Form with Local Storage Database</p>
</header>

<div class="main">

<div class="box">

<h2>Register Student</h2>

<form id="form">

<label>Student ID</label>
<input type="text" id="sid" required>

<label>Full Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Gender</label>
<select id="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Department</label>
<select id="dept" required>
<option value="">Select</option>
<option>Computer Science</option>
<option>Electrical</option>
<option>Mechanical</option>
<option>Business</option>
</select>

<label>Phone</label>
<input type="tel" id="phone" required>

<label>Address</label>
<input type="text" id="address">

<button class="register">Register Student</button>
<button type="button" class="clear" onclick="clearForm()">Clear</button>

</form>

</div>

<div class="box">

<h2>Student Database</h2>

<button class="load" onclick="loadStudents()">Load Students</button>
<button class="clear" onclick="clearDB()">Clear Database</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Dept</th>
<th>Phone</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<footer>
<p>Developed by: Your Name | Student Registration Project</p>
</footer>

</div>

<script>

let students=JSON.parse(localStorage.getItem("students"))||[];

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

let student={
sid:document.getElementById("sid").value,
name:document.getElementById("name").value,
email:document.getElementById("email").value,
dob:document.getElementById("dob").value,
gender:document.getElementById("gender").value,
dept:document.getElementById("dept").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value
};

students.push(student);

localStorage.setItem("students",JSON.stringify(students));

alert("Student Registered Successfully");

this.reset();

});

function loadStudents(){

let table=document.getElementById("table");

table.innerHTML="";

students.forEach((s,i)=>{

table.innerHTML+=`

<tr>
<td>${s.sid}</td>
<td>${s.name}</td>
<td>${s.email}</td>
<td>${s.dept}</td>
<td>${s.phone}</td>
</tr>

`;

});

}

function clearForm(){

document.getElementById("form").reset();

}

function clearDB(){

localStorage.removeItem("students");

students=[];

document.getElementById("table").innerHTML="";

alert("Database Cleared");

}

</script>

</body>
</html>
