<!DOCTYPE html>
<html>
<head>
    <title>Subscription Engine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .status-active {
            color: green;
            font-weight: bold;
        }

        .status-cancelled {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Subscription Dashboard</h1>

    <button onclick="loadSubscriptions()">Load Subscriptions</button>

    <div id="subscriptionList"></div>
</div>

<script>
    function loadSubscriptions() {
        fetch('/subscriptions')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('subscriptionList');
                container.innerHTML = '';

                data.forEach(sub => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    card.innerHTML = `
                        <h3>${sub.user.name}</h3>
                        <p><strong>Email:</strong> ${sub.user.email}</p>
                        <p><strong>Plan:</strong> ${sub.plan.name}</p>
                        <p><strong>Price:</strong> ₹${sub.plan.price}</p>
                        <p><strong>Start:</strong> ${sub.startDate}</p>
                        <p><strong>End:</strong> ${sub.endDate}</p>
                        <p><strong>Status:</strong> 
                            <span class="${sub.status === 'CANCELLED' ? 'status-cancelled' : 'status-active'}">
                                ${sub.status || 'ACTIVE'}
                            </span>
                        </p>
                    `;

                    container.appendChild(card);
                });
            });
    }
</script>

</body>
</html>
