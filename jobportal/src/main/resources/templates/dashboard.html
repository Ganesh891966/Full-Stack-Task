<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard | Job Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(0, 245, 255, 0.18), transparent 25%),
        radial-gradient(circle at bottom right, rgba(123, 92, 255, 0.20), transparent 30%),
        linear-gradient(135deg, #071120, #0b1730, #101a3b);
    color: white;
    padding: 30px;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    border-radius: 24px;
    background: rgba(12, 18, 36, 0.75);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    margin-bottom: 30px;
}

.logo {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, #ffffff, #93c5fd, #c4b5fd);
    -webkit-background-clip: text;
    color: transparent;
}

.logout-btn {
    padding: 12px 22px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    background: linear-gradient(90deg, #ef4444, #f97316);
}

/* Hero */
.hero {
    padding: 50px;
    border-radius: 30px;
    background: rgba(12, 18, 36, 0.72);
    margin-bottom: 35px;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 15px;
}

.hero p {
    color: #cbd5e1;
    margin-bottom: 25px;
}

.hero-buttons {
    display: flex;
    gap: 16px;
}

.hero-buttons a {
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 16px;
    font-weight: 700;
}

.primary-btn {
    background: linear-gradient(90deg, #00c6ff, #3b82f6, #7c3aed);
    color: white;
}

.secondary-btn {
    border: 1px solid rgba(255,255,255,0.15);
    color: #e2e8f0;
}

/* Stats */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    padding: 20px;
    border-radius: 20px;
    background: rgba(12, 18, 36, 0.72);
}

.number {
    font-size: 30px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">JobPortal Pro Dashboard</div>

    <form th:action="@{/logout}" method="post">
        <button class="logout-btn" type="submit">Logout</button>
    </form>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Welcome to Your Career Dashboard</h1>

    <p>
        Explore jobs, update your profile, and build your career.
    </p>

    <!-- ✅ FIXED BUTTONS -->
    <div class="hero-buttons">
        <a th:href="@{/view-jobs}" class="primary-btn">Browse Jobs</a>
        <a th:href="@{/profile}" class="secondary-btn">Update Profile</a>
    </div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>Jobs Applied</h3>
        <div class="number">0</div>
    </div>

    <div class="card">
        <h3>Shortlisted</h3>
        <div class="number">0</div>
    </div>

    <div class="card">
        <h3>Saved Jobs</h3>
        <div class="number">0</div>
    </div>
</div>

</body>
</html>
