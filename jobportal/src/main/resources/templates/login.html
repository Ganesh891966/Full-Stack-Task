<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login | Job Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(0, 245, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(123, 92, 255, 0.20), transparent 35%),
        linear-gradient(135deg, #071120, #0b1730, #101a3b);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
    overflow: hidden;
}

.container {
    width: 420px;
    padding: 42px 36px;
    border-radius: 28px;
    background: rgba(12, 18, 36, 0.78);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 20px 80px rgba(0,0,0,0.45),
        0 0 40px rgba(0, 183, 255, 0.14),
        0 0 90px rgba(123, 92, 255, 0.14);
    backdrop-filter: blur(24px);
    position: relative;
}

.container::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 30px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(0,245,255,0.35), rgba(123,92,255,0.35), rgba(255,255,255,0.08));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

.badge {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 999px;
    margin-bottom: 22px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #7dd3fc;
    background: rgba(56, 189, 248, 0.08);
    border: 1px solid rgba(56, 189, 248, 0.25);
    box-shadow: 0 0 20px rgba(56,189,248,0.12);
    text-transform: uppercase;
}

.container h2 {
    font-size: 40px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #ffffff, #b9d6ff, #d7c3ff);
    -webkit-background-clip: text;
    color: transparent;
}

.container p {
    color: #94a3b8;
    margin-bottom: 28px;
    line-height: 1.8;
    font-size: 16px;
}

.msg {
    padding: 14px 18px;
    border-radius: 16px;
    margin-bottom: 18px;
    font-weight: 600;
    font-size: 14px;
}

.error {
    background: rgba(239,68,68,0.10);
    border: 1px solid rgba(239,68,68,0.28);
    color: #fda4af;
    box-shadow: 0 0 18px rgba(239,68,68,0.12);
}

.success {
    background: rgba(34,197,94,0.10);
    border: 1px solid rgba(34,197,94,0.28);
    color: #86efac;
    box-shadow: 0 0 18px rgba(34,197,94,0.12);
}

label {
    display: block;
    margin-bottom: 8px;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
}

input {
    width: 100%;
    padding: 16px 18px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.035);
    color: #ffffff;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: inset 0 0 12px rgba(255,255,255,0.02);
}

input::placeholder {
    color: #7c8aa5;
}

input:focus {
    border-color: rgba(96, 165, 250, 0.75);
    box-shadow:
        0 0 0 4px rgba(59,130,246,0.12),
        0 0 20px rgba(59,130,246,0.20);
    transform: translateY(-1px);
}

button {
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    border: none;
    border-radius: 18px;
    font-size: 17px;
    font-weight: 800;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #00c6ff, #3b82f6, #7c3aed);
    box-shadow:
        0 12px 30px rgba(59,130,246,0.25),
        0 0 30px rgba(124,58,237,0.18);
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow:
        0 18px 35px rgba(59,130,246,0.30),
        0 0 36px rgba(124,58,237,0.22);
}

.bottom {
    text-align: center;
    margin-top: 24px;
    color: #94a3b8;
    font-size: 15px;
}

.bottom a {
    color: #7dd3fc;
    font-weight: 700;
    text-decoration: none;
}

.bottom a:hover {
    color: #c084fc;
}

@media (max-width: 500px) {
    .container {
        width: 92%;
        padding: 32px 24px;
    }

    .container h2 {
        font-size: 32px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="badge">Secure Access</div>

    <h2>Welcome Back</h2>
    <p>Sign in to access your personalized job portal dashboard.</p>

    <!-- ERROR -->
    <div th:if="${error}" class="msg error" th:text="${error}"></div>

    <!-- SUCCESS -->
    <div th:if="${success}" class="msg success" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">

        <label>Email Address</label>
        <input type="email" name="username" placeholder="Enter your email address" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Login to Dashboard</button>
    </form>

    <div class="bottom">
        Don’t have an account?
        <a th:href="@{/register}">Create one</a>
    </div>

</div>

</body>
</html>
