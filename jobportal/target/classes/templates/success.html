<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration Successful | Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.25), transparent 28%),
                radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.25), transparent 28%),
                linear-gradient(135deg, #0f172a, #1e293b, #1e1b4b);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #f8fafc;
        }

        .success-card {
            width: 100%;
            max-width: 720px;
            background: rgba(15, 23, 42, 0.68);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 70px 50px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.35);
            position: relative;
            overflow: hidden;
        }

        .success-card::before {
            content: "";
            position: absolute;
            top: -80px;
            right: -80px;
            width: 220px;
            height: 220px;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 50%;
            filter: blur(12px);
        }

        .success-card::after {
            content: "";
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 220px;
            height: 220px;
            background: rgba(99, 102, 241, 0.12);
            border-radius: 50%;
            filter: blur(12px);
        }

        .icon {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 20px 45px rgba(34, 197, 94, 0.25);
            position: relative;
            z-index: 2;
        }

        .badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.12);
            color: #86efac;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            border: 1px solid rgba(34, 197, 94, 0.18);
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 46px;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 16px;
            letter-spacing: -1px;
            position: relative;
            z-index: 2;
        }

        p {
            font-size: 19px;
            color: #cbd5e1;
            line-height: 1.9;
            max-width: 580px;
            margin: 0 auto 34px;
            position: relative;
            z-index: 2;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            text-decoration: none;
            padding: 16px 28px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.28s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 20px 35px rgba(59, 130, 246, 0.22);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
        }

        @media (max-width: 640px) {
            .success-card {
                padding: 48px 24px;
                border-radius: 24px;
            }

            h1 {
                font-size: 34px;
            }

            p {
                font-size: 17px;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon">✓</div>
    <div class="badge">Registration Successful</div>
    <h1>Account Created Successfully</h1>
    <p>
        Your profile has been created successfully. You can now continue exploring the Job Portal,
        discover opportunities, and manage your career journey in a smarter way.
    </p>

    <div class="actions">
        <a th:href="@{/}" class="btn btn-primary">Go to Home</a>
        <a th:href="@{/login}" class="btn btn-secondary">Login Now</a>
    </div>
</div>

</body>
</html>
