<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Profile</title>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: 'Segoe UI';
    color: white;
}

.container {
    width: 400px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

input::placeholder {
    color: #cbd5e1;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #3b82f6, #7c3aed);
    color: white;
}

button:hover {
    transform: scale(1.05);
}
</style>

</head>
<body>

<div class="container">

    <h2>Update Profile</h2>

    <form th:action="@{/update-profile}" method="post">

        <input type="text" name="fullName"
               th:value="${user.fullName}" placeholder="Full Name"/>

        <input type="text" name="phone"
               th:value="${user.phone}" placeholder="Phone"/>

        <input type="text" name="location"
               th:value="${user.location}" placeholder="Location"/>

        <button type="submit">Update Profile</button>

    </form>

</div>

</body>
</html>
